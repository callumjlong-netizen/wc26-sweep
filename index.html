<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC26 Sweep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a6b3c;
    --green-light: #2d9e5f;
    --green-dark: #0f3d22;
    --gold: #f0b429;
    --gold-light: #ffd97d;
    --cream: #faf8f3;
    --white: #ffffff;
    --grey-100: #f4f2ed;
    --grey-200: #e8e4db;
    --grey-300: #ccc8be;
    --grey-500: #888070;
    --grey-700: #4a4640;
    --dark: #1a1814;
    --red: #c0392b;
    --blue: #1a56db;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--green-dark);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--gold);
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 0;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 0.06em;
    padding: 12px 20px 12px 0;
    border-right: 1px solid rgba(255,255,255,0.15);
    margin-right: 4px;
    white-space: nowrap;
  }
  .logo span { color: var(--white); }
  nav { display: flex; gap: 0; }
  nav button {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 16px 16px 13px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: color 0.15s, border-color 0.15s;
  }
  nav button:hover { color: var(--white); }
  nav button.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── LOADING ── */
  #loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    flex-direction: column;
    gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--grey-200);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 13px; color: var(--grey-500); }

  /* ── PAGES ── */
  .page { display: none; }
  .page.active { display: block; }
  .inner { max-width: 900px; margin: 0 auto; padding: 20px 16px 40px; }

  /* ── STAT CARDS ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--white);
    border: 1px solid var(--grey-200);
    border-radius: 10px;
    padding: 14px 16px;
    text-align: center;
  }
  .stat-card .val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    color: var(--green);
    letter-spacing: 0.03em;
    line-height: 1;
  }
  .stat-card .lbl {
    font-size: 11px;
    color: var(--grey-500);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 4px;
  }

  /* ── PRIZE POT ── */
  .prize-box {
    background: var(--green-dark);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .prize-box .pot-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .prize-box .pot-amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    color: var(--white);
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .prize-splits { display: flex; gap: 10px; flex-wrap: wrap; }
  .prize-split {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
    min-width: 90px;
  }
  .prize-split .pos {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--gold);
    margin-bottom: 2px;
  }
  .prize-split .winner-name {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100px;
  }
  .prize-split .prize-amt {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--white);
    letter-spacing: 0.04em;
  }

  /* ── SEARCH ── */
  .search-bar {
    width: 100%;
    padding: 9px 14px;
    border: 1px solid var(--grey-200);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    background: var(--white);
    color: var(--dark);
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-bar:focus { border-color: var(--green); }

  /* ── LEADERBOARD ── */
  .lb-wrap {
    background: var(--white);
    border: 1px solid var(--grey-200);
    border-radius: 12px;
    overflow: hidden;
  }
  .lb-head {
    display: grid;
    grid-template-columns: 44px 1fr 48px;
    gap: 8px;
    padding: 9px 16px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--grey-500);
    background: var(--grey-100);
    border-bottom: 1px solid var(--grey-200);
  }
  .lb-row {
    border-bottom: 1px solid var(--grey-100);
    cursor: pointer;
    transition: background 0.1s;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover .lb-row-main { background: #f9f7f2; }
  .lb-row.open .lb-row-main { background: #f4f2eb; }
  .lb-row-main {
    display: grid;
    grid-template-columns: 44px 1fr 48px;
    align-items: center;
    gap: 8px;
    padding: 11px 16px;
  }
  .rank-badge {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    background: var(--grey-100);
    color: var(--grey-700);
  }
  .rank-badge.r1 { background: var(--gold); color: #5a3800; }
  .rank-badge.r2 { background: #d4d0c8; color: #3a3830; }
  .rank-badge.r3 { background: #e8a07a; color: #5a2800; }
  .entry-name { font-weight: 600; font-size: 14px; }
  .entry-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .team-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--grey-100);
    color: var(--grey-700);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.03em;
  }
  .pts-col {
    text-align: right;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--green);
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
  }
  .chevron { font-size: 12px; color: var(--grey-300); transition: transform 0.2s; }
  .lb-row.open .chevron { transform: rotate(180deg); }

  /* ── ENTRY EXPAND ── */
  .lb-expand {
    display: none;
    padding: 12px 16px 16px;
    background: #f4f2eb;
    border-top: 1px solid var(--grey-200);
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .lb-row.open .lb-expand { display: grid; }
  .expand-slot {
    background: var(--white);
    border: 1px solid var(--grey-200);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .expand-slot .slot-team {
    font-weight: 600;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
  }
  .expand-slot .slot-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--green);
    letter-spacing: 0.04em;
  }
  .expand-slot .slot-player {
    font-size: 11px;
    color: var(--grey-500);
    margin-top: 2px;
  }
  .expand-slot .slot-breakdown {
    font-size: 11px;
    color: var(--grey-500);
    display: flex;
    gap: 10px;
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  /* ── SECTION HEADER ── */
  .section-head {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.06em;
    color: var(--green-dark);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--gold);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .section-head span {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--grey-500);
    letter-spacing: 0;
  }

  /* ── FIXTURES ── */
  .fix-group { margin-bottom: 20px; }
  .fix-group-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--grey-500);
    padding: 6px 14px;
    background: var(--grey-100);
    border-radius: 6px 6px 0 0;
    border: 1px solid var(--grey-200);
    border-bottom: none;
  }
  .fix-list {
    background: var(--white);
    border: 1px solid var(--grey-200);
    border-radius: 0 0 10px 10px;
    overflow: hidden;
  }
  .fix-row {
    display: grid;
    grid-template-columns: 1fr 70px 1fr 90px;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--grey-100);
    font-size: 13px;
  }
  .fix-row:last-child { border-bottom: none; }
  .fix-home { text-align: right; font-weight: 600; }
  .fix-away { font-weight: 600; }
  .fix-score {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    font-size: 14px;
    background: var(--grey-100);
    border-radius: 6px;
    padding: 3px 8px;
  }
  .fix-score.live-score { background: #fde8e8; color: var(--red); }
  .fix-time { font-size: 11px; color: var(--grey-500); text-align: right; }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }
  .pill-live { background: #fde8e8; color: var(--red); }
  .pill-done { background: #dcfce7; color: #166534; }
  .pill-upcoming { background: var(--grey-100); color: var(--grey-500); }
  .live-pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── GOAL LOG ── */
  .goal-list {
    background: var(--white);
    border: 1px solid var(--grey-200);
    border-radius: 12px;
    overflow: hidden;
  }
  .goal-row {
    display: grid;
    grid-template-columns: 60px 1fr 1fr 60px;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--grey-100);
    font-size: 13px;
  }
  .goal-row:last-child { border-bottom: none; }
  .goal-min {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--green);
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .goal-min small { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--grey-500); }
  .goal-team { font-weight: 600; }
  .goal-player { font-size: 12px; color: var(--grey-500); margin-top: 2px; }
  .goal-match { font-size: 11px; color: var(--grey-500); }
  .goal-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--green);
    letter-spacing: 0.04em;
    text-align: right;
  }
  .goal-pts small { font-family: 'DM Sans', sans-serif; font-size: 10px; color: var(--grey-500); display: block; }
  .shootout-row { opacity: 0.45; }
  .shootout-badge {
    font-size: 9px;
    background: #fef9c3;
    color: #92400e;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
    margin-left: 6px;
  }

  /* ── ERROR / EMPTY ── */
  .empty {
    padding: 40px;
    text-align: center;
    color: var(--grey-500);
    font-size: 13px;
  }
  .error-box {
    background: #fde8e8;
    border: 1px solid #fca5a5;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 16px;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: var(--grey-300);
    border-top: 1px solid var(--grey-200);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .lb-expand { grid-template-columns: 1fr; }
    .prize-box { flex-direction: column; align-items: flex-start; }
    .fix-row { grid-template-columns: 1fr 56px 1fr 70px; font-size: 12px; }
    .goal-row { grid-template-columns: 50px 1fr 1fr 50px; }
    nav button { padding: 16px 10px 13px; font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">WC<span>26</span></div>
    <nav>
      <button class="active" onclick="showPage('leaderboard',this)">Leaderboard</button>
      <button onclick="showPage('fixtures',this)">Fixtures</button>
      <button onclick="showPage('goallog',this)">Goal Log</button>
    </nav>
  </div>
</header>

<div id="loading">
  <div class="spinner"></div>
  <p>Loading sweepstake data…</p>
</div>

<div id="error-global" style="display:none;max-width:900px;margin:20px auto;padding:0 16px">
  <div class="error-box" id="error-msg"></div>
</div>

<!-- LEADERBOARD -->
<div id="page-leaderboard" class="page">
  <div class="inner">
    <div class="stats-row">
      <div class="stat-card"><div class="val" id="st-entries">—</div><div class="lbl">Entries</div></div>
      <div class="stat-card"><div class="val" id="st-goals">—</div><div class="lbl">Goals</div></div>
      <div class="stat-card"><div class="val" id="st-teams">—</div><div class="lbl">Teams</div></div>
      <div class="stat-card"><div class="val" id="st-live">—</div><div class="lbl">Live Now</div></div>
    </div>

    <div class="prize-box" id="prize-box">
      <div>
        <div class="pot-label">Total Prize Pot</div>
        <div class="pot-amount" id="pot-amount">£0</div>
      </div>
      <div class="prize-splits" id="prize-splits"></div>
    </div>

    <input class="search-bar" type="text" placeholder="Search entries…" oninput="filterLeaderboard(this.value)" id="lb-search">

    <div class="lb-wrap">
      <div class="lb-head"><div>Pos</div><div>Entry</div><div style="text-align:right">Pts</div></div>
      <div id="lb-body"></div>
    </div>
  </div>
</div>

<!-- FIXTURES -->
<div id="page-fixtures" class="page">
  <div class="inner">
    <div class="section-head">Fixtures <span id="fix-subtitle"></span></div>
    <div id="fix-body"></div>
  </div>
</div>

<!-- GOAL LOG -->
<div id="page-goallog" class="page">
  <div class="inner">
    <div class="section-head">Goal Log <span id="goal-subtitle"></span></div>
    <div class="goal-list" id="goal-body"></div>
  </div>
</div>

<footer>WC26 Sweep · Data from Google Sheets · Refreshes every 60s</footer>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SHEET_ID = '1mfRVjcf4AQdTZUxkRxHSkcxLwWM5mjP_ZmJmulk3uag'
const GIDS = {
  teams:   0,
  players: 99924963,
  misc:    2102016458,
  games:   1623682605,
  goals:   496720377,
  entries: 1939432222,
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let DATA = { teams:{}, players:{}, misc:{}, games:[], goals:[], entries:[] }
let scored = []

// ── FETCH ─────────────────────────────────────────────────────────────────────
function csvUrl(gid) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`
}

function parseCSV(text) {
  const lines = text.trim().split('\n')
  if (lines.length < 2) return []
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''))
  return lines.slice(1).map(line => {
    // Handle quoted fields with commas
    const vals = []
    let cur = '', inQ = false
    for (let i = 0; i < line.length; i++) {
      const c = line[i]
      if (c === '"') { inQ = !inQ }
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = '' }
      else cur += c
    }
    vals.push(cur.trim())
    const obj = {}
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').replace(/^"|"$/g, '') })
    return obj
  })
}

async function fetchSheet(gid) {
  const res = await fetch(csvUrl(gid))
  if (!res.ok) throw new Error(`Failed to load sheet gid=${gid}`)
  return parseCSV(await res.text())
}

async function loadAll() {
  try {
    const [teams, players, misc, games, goals, entries] = await Promise.all([
      fetchSheet(GIDS.teams),
      fetchSheet(GIDS.players),
      fetchSheet(GIDS.misc),
      fetchSheet(GIDS.games),
      fetchSheet(GIDS.goals),
      fetchSheet(GIDS.entries),
    ])

    // Teams map: number → {name, code, group}
    DATA.teams = {}
    teams.forEach(r => {
      const n = parseInt(r['Team Number'])
      if (n) DATA.teams[n] = { name: r['Team Name'], code: r['Fifa Code'], group: r['Group'] }
    })

    // Players map: "teamNum-playerNum" → {name, shortName, position, multiplier}
    DATA.players = {}
    // Misc for multipliers
    const mult = {}
    misc.forEach(r => { if (r['Name'] && r['Value']) mult[r['Name'].trim()] = parseFloat(r['Value']) || 1 })
    const posMultiplier = { G: mult['G']||6, D: mult['D']||4, M: mult['M']||2, F: mult['F']||1 }
    DATA.misc = { price: mult['Price'] || 2.5, posMultiplier }

    players.forEach(r => {
      const tn = parseInt(r['Team Number'])
      const pn = parseInt(r['Player Number'])
      if (tn && pn) {
        DATA.players[`${tn}-${pn}`] = {
          name: r['Player Name'] || '',
          shortName: r['Short Name'] || '',
          position: r['Position'] || '',
          multiplier: posMultiplier[r['Position']] || 1,
        }
      }
    })

    // Games
    DATA.games = games.filter(r => r['Match Number']).map(r => ({
      matchNum: parseInt(r['Match Number']),
      home: parseInt(r['Home Team']),
      away: parseInt(r['Away Team']),
      dateTime: r['Date Time'] || '',
      label: r['Match Lable'] || r['Match Label'] || '',
      homeScore: r['Home Score'] !== undefined ? r['Home Score'] : '',
      awayScore: r['Away Score'] !== undefined ? r['Away Score'] : '',
      status: r['Status'] || '',
    }))

    // Goals — filter out placeholder zeros
    DATA.goals = goals.filter(r => {
      const mn = parseInt(r['Match Number'])
      const tn = parseInt(r['Team Number'])
      const pn = parseInt(r['Player Number'])
      return mn > 0 || tn > 0 || pn > 0
    }).map(r => ({
      matchNum: parseInt(r['Match Number']) || 0,
      teamNum: parseInt(r['Team Number']) || 0,
      playerNum: parseInt(r['Player Number']) || 0,
      minute: r['Minute'] || '',
      isShootout: (r['Shootout'] || '').toLowerCase() === 'y',
    }))

    // Entries — filter out placeholder
    DATA.entries = entries.filter(r => {
      const name = r['Entry Name'] || ''
      return name && name !== 'Place Holder' && name !== '0'
    }).map(r => ({
      num: parseInt(r['Entry Number']) || 0,
      name: r['Entry Name'] || '',
      teams: [
        parseInt(r['Team 1'])||0, parseInt(r['Team 2'])||0,
        parseInt(r['Team 3'])||0, parseInt(r['Team 4'])||0,
      ],
      players: [
        parseInt(r['Player 1'])||0, parseInt(r['Player 2'])||0,
        parseInt(r['Player 3'])||0, parseInt(r['Player 4'])||0,
      ],
      paid: (r['Paid'] || '').toUpperCase() === 'Y',
    }))

    calcScores()
    render()
    document.getElementById('loading').style.display = 'none'
    document.getElementById('page-leaderboard').classList.add('active')
  } catch(e) {
    document.getElementById('loading').style.display = 'none'
    document.getElementById('error-global').style.display = 'block'
    document.getElementById('error-msg').textContent = 'Could not load data: ' + e.message
    console.error(e)
  }
}

// ── SCORING ───────────────────────────────────────────────────────────────────
function calcScores() {
  const scoringGoals = DATA.goals.filter(g => !g.isShootout)

  scored = DATA.entries.map(entry => {
    const slots = [0,1,2,3].map(i => {
      const tn = entry.teams[i]
      const pn = entry.players[i]
      const playerInfo = DATA.players[`${tn}-${pn}`] || {}
      const mult = playerInfo.multiplier || 1

      const teamGoals = scoringGoals.filter(g => g.teamNum === tn).length
      const playerGoals = scoringGoals.filter(g => g.teamNum === tn && g.playerNum === pn).length

      return { tn, pn, mult, teamGoals, playerGoals, pts: teamGoals + playerGoals * mult }
    })
    return { entry, slots, total: slots.reduce((s,x) => s + x.pts, 0) }
  }).sort((a,b) => b.total - a.total)
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  renderLeaderboard()
  renderFixtures()
  renderGoalLog()
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
function renderLeaderboard(filter='') {
  const paidEntries = DATA.entries.filter(e => e.paid)
  const pot = Math.round(paidEntries.length * DATA.misc.price)
  const scoringGoals = DATA.goals.filter(g => !g.isShootout)
  const liveCount = DATA.games.filter(g => (g.status||'').toLowerCase() === 'live').length

  document.getElementById('st-entries').textContent = DATA.entries.length
  document.getElementById('st-goals').textContent = scoringGoals.length
  document.getElementById('st-teams').textContent = Object.keys(DATA.teams).length
  document.getElementById('st-live').textContent = liveCount

  document.getElementById('pot-amount').textContent = `£${pot}`

  // Prize splits — 100/0/0 default, could be in misc
  const misc = DATA.misc
  const s1 = parseFloat(misc.split1 || 100)
  const s2 = parseFloat(misc.split2 || 0)
  const s3 = parseFloat(misc.split3 || 0)
  const positions = ['1st','2nd','3rd']
  const splitPcts = [s1, s2, s3]
  let splitsHTML = ''
  splitPcts.forEach((pct, i) => {
    if (!pct) return
    const winner = scored[i]
    const amt = Math.round(pot * pct / 100)
    splitsHTML += `<div class="prize-split">
      <div class="pos">${positions[i]}</div>
      <div class="winner-name">${winner ? winner.entry.name : 'TBD'}</div>
      <div class="prize-amt">£${amt}</div>
    </div>`
  })
  document.getElementById('prize-splits').innerHTML = splitsHTML || `<div class="prize-split"><div class="pos">1st</div><div class="winner-name">${scored[0]?scored[0].entry.name:'TBD'}</div><div class="prize-amt">£${pot}</div></div>`

  const q = filter.toLowerCase()
  const filtered = scored.filter(s => s.entry.name.toLowerCase().includes(q))

  let html = ''
  filtered.forEach((s, idx) => {
    const rank = scored.indexOf(s) + 1
    const rCls = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : ''
    const tags = s.slots.map(slot => {
      const t = DATA.teams[slot.tn]
      return t ? `<span class="team-tag">${t.code || t.name.substring(0,3).toUpperCase()}</span>` : ''
    }).join('')

    const expandSlots = s.slots.map((slot, i) => {
      const t = DATA.teams[slot.tn]
      const p = DATA.players[`${slot.tn}-${slot.pn}`]
      const tName = t ? t.name : `Team ${slot.tn}`
      const pName = p ? (p.shortName || p.name) : `Player #${slot.pn}`
      const posLabel = { 6:'GK ×6', 4:'DEF ×4', 2:'MID ×2', 1:'FWD ×1' }[slot.mult] || `×${slot.mult}`
      return `<div class="expand-slot">
        <div class="slot-team"><span>${tName}</span><span class="slot-pts">${slot.pts}</span></div>
        <div class="slot-player">${pName} · ${posLabel}</div>
        <div class="slot-breakdown">
          <span>Team: +${slot.teamGoals}</span>
          <span>Player: ${slot.playerGoals}×${slot.mult}=+${slot.playerGoals*slot.mult}</span>
        </div>
      </div>`
    }).join('')

    html += `<div class="lb-row" onclick="toggleRow(this)">
      <div class="lb-row-main">
        <div><div class="rank-badge ${rCls}">${rank}</div></div>
        <div>
          <div class="entry-name">${s.entry.name}</div>
          <div class="entry-tags">${tags}</div>
        </div>
        <div class="pts-col">${s.total}<span class="chevron">▼</span></div>
      </div>
      <div class="lb-expand">${expandSlots}</div>
    </div>`
  })

  document.getElementById('lb-body').innerHTML = html || '<div class="empty">No entries yet</div>'
}

function filterLeaderboard(val) { renderLeaderboard(val) }

function toggleRow(row) {
  row.classList.toggle('open')
}

// ── FIXTURES ──────────────────────────────────────────────────────────────────
function renderFixtures() {
  const now = new Date()

  const withStatus = DATA.games.map(g => {
    const dt = g.dateTime ? new Date(g.dateTime) : null
    let status = (g.status || '').toLowerCase()
    if (!status) {
      if (!dt) status = 'upcoming'
      else if (dt > now) status = 'upcoming'
      else status = 'completed'
    }
    return { ...g, dt, status }
  })

  const groups = [
    { key:'live', label:'Live Now', items: withStatus.filter(g => g.status==='live') },
    { key:'completed', label:'Completed', items: withStatus.filter(g => g.status==='completed') },
    { key:'upcoming', label:'Upcoming', items: withStatus.filter(g => g.status==='upcoming') },
  ]

  document.getElementById('fix-subtitle').textContent = `${withStatus.length} matches`

  let html = ''
  groups.forEach(grp => {
    if (!grp.items.length) return
    html += `<div class="fix-group"><div class="fix-group-label">${grp.label}</div><div class="fix-list">`
    grp.items.forEach(g => {
      const home = DATA.teams[g.home]
      const away = DATA.teams[g.away]
      const homeName = home ? home.name : `Team ${g.home}`
      const awayName = away ? away.name : `Team ${g.away}`

      const hasScore = g.homeScore !== '' && g.awayScore !== '' && g.homeScore !== undefined && g.awayScore !== undefined
      let scoreEl = ''
      if (grp.key === 'live' || (grp.key === 'completed' && hasScore)) {
        scoreEl = `<div class="fix-score${grp.key==='live'?' live-score':''}">${g.homeScore || 0} – ${g.awayScore || 0}</div>`
      } else {
        scoreEl = `<div class="fix-score" style="font-size:11px;color:#aaa">vs</div>`
      }

      let statusEl = ''
      if (grp.key === 'live') {
        statusEl = `<div style="text-align:right"><span class="pill pill-live"><span class="live-pulse"></span>Live</span></div>`
      } else if (grp.key === 'completed') {
        statusEl = `<div style="text-align:right"><span class="pill pill-done">FT</span></div>`
      } else {
        const timeStr = g.dt ? g.dt.toLocaleDateString('en-GB', {day:'numeric',month:'short'}) + ' ' + g.dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : g.dateTime
        statusEl = `<div class="fix-time">${timeStr}<br><span style="font-size:10px;color:#bbb">${g.label}</span></div>`
      }

      html += `<div class="fix-row">
        <div class="fix-home">${homeName}</div>
        ${scoreEl}
        <div class="fix-away">${awayName}</div>
        ${statusEl}
      </div>`
    })
    html += '</div></div>'
  })

  document.getElementById('fix-body').innerHTML = html || '<div class="empty">No fixtures loaded</div>'
}

// ── GOAL LOG ──────────────────────────────────────────────────────────────────
function renderGoalLog() {
  const goals = [...DATA.goals].reverse()
  const scoring = goals.filter(g => !g.isShootout)
  document.getElementById('goal-subtitle').textContent = `${scoring.length} goal${scoring.length!==1?'s':''} scored`

  if (!goals.length) {
    document.getElementById('goal-body').innerHTML = '<div class="empty">No goals logged yet</div>'
    return
  }

  let html = ''
  goals.forEach(g => {
    const team = DATA.teams[g.teamNum]
    const player = DATA.players[`${g.teamNum}-${g.playerNum}`]
    const game = DATA.games.find(gm => gm.matchNum === g.matchNum)

    const teamName = team ? team.name : `Team ${g.teamNum}`
    const playerName = player ? (player.shortName || player.name) : `Player #${g.playerNum}`
    const posLabel = player ? ({'G':'GK ×6','D':'DEF ×4','M':'MID ×2','F':'FWD ×1'}[player.position] || '') : ''
    const matchLabel = game ? (() => {
      const h = DATA.teams[game.home]; const a = DATA.teams[game.away]
      return `${h?h.name:`T${game.home}`} vs ${a?a.name:`T${game.away}`}`
    })() : (g.matchNum ? `Match ${g.matchNum}` : '')

    const mult = (player && !g.isShootout) ? player.multiplier : 0
    const ptsFromGoal = 1 + mult  // 1 for team + mult for player

    html += `<div class="goal-row${g.isShootout?' shootout-row':''}">
      <div>
        <div class="goal-min">${g.minute || '—'}<br><small>min</small></div>
      </div>
      <div>
        <div class="goal-team">${teamName}${g.isShootout?'<span class="shootout-badge">SHOOTOUT</span>':''}</div>
        <div class="goal-player">${playerName}${posLabel?' · '+posLabel:''}</div>
      </div>
      <div class="goal-match">${matchLabel}</div>
      <div class="goal-pts">
        ${g.isShootout ? '<span style="font-size:11px;color:#aaa">No pts</span>' : `+${ptsFromGoal}<small>pts to holders</small>`}
      </div>
    </div>`
  })

  document.getElementById('goal-body').innerHTML = html
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'))
  document.getElementById('page-' + id).classList.add('active')
  btn.classList.add('active')
}
